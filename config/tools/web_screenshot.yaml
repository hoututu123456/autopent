name: web_screenshot
description: Use a headless browser (Chromium/Firefox) to take a screenshot of a website for evidence.
command: python3
args:
  - src/tools/screenshot.py
parameters:
  - name: url
    description: The target URL (e.g., http://192.168.1.1 or https://example.com)
    required: true
    format: positional
    position: 0
  - name: filename
    description: The output filename (e.g., evidence_login.png). Files will be saved in data/reports/images/
    required: true
    format: template
    template: data/reports/images/{value}
