name: "ssh"
command: "ssh"
enabled: true
short_description: "SSH客户端，用于远程登录和端口转发"
description: |
  OpenSSH 客户端，用于登录远程机器、执行命令以及建立加密隧道（端口转发）。

  **主要功能：**
  - 远程登录 (Remote Login)
  - 端口转发 (Local/Remote Port Forwarding)
  - 密钥认证 (Key-based Authentication)
  - 代理跳转 (ProxyJump)

  **使用场景：**
  - 漏洞利用后的远程连接 (Lateral Movement)
  - 内网穿透与隧道搭建
  - 获取交互式 Shell

parameters:
  - name: "target"
    type: "string"
    description: "目标，格式为 user@host"
    required: true
    position: 0
    format: "positional"
  - name: "port"
    type: "int"
    description: "目标端口"
    required: false
    default: 22
    flag: "-p"
    format: "flag"
  - name: "identity_file"
    type: "string"
    description: "私钥文件路径"
    required: false
    flag: "-i"
    format: "flag"
  - name: "local_forward"
    type: "string"
    description: "本地端口转发 (格式: local_port:remote_host:remote_port)"
    required: false
    flag: "-L"
    format: "flag"
  - name: "remote_forward"
    type: "string"
    description: "远程端口转发 (格式: remote_port:local_host:local_port)"
    required: false
    flag: "-R"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "额外参数 (如 -o StrictHostKeyChecking=no)"
    required: false
    format: "positional"
